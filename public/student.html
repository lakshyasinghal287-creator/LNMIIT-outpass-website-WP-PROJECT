<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-title">Student Dashboard</div>
    <div class="nav-actions">
      <button id="themeToggle" class="theme-btn small">Night Mode</button>
      <button class="secondary small" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="mini-grid">
      <div class="info-box"><strong id="totalCount">0</strong><br/>Total Requests</div>
      <div class="info-box"><strong id="pendingCount">0</strong><br/>Pending</div>
      <div class="info-box"><strong id="approvedCount">0</strong><br/>Approved</div>
      <div class="info-box"><strong id="rejectedCount">0</strong><br/>Rejected</div>
    </div>

    <div class="card">
      <h2>Create Outpass Request</h2>
      <div id="formMessage"></div>

      <label>Date & Time Out</label>
      <input type="text" id="outTime" placeholder="Select out date and time" />

      <label>Expected Return Time</label>
      <input type="text" id="returnTime" placeholder="Select return date and time" />

      <label>Reason</label>
      <textarea id="reason" placeholder="Enter reason"></textarea>

      <button id="createBtn">Submit Request</button>
    </div>

    <div class="card">
      <h2>My Requests</h2>
      <p class="muted" style="margin-top:-6px;">Pending requests can be edited or canceled.</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Out Time</th>
              <th>Return Time</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Admin Comment</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="requestsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal-overlay">
    <div class="modal-box">
      <h3>Edit Request</h3>
      <label for="editOutTime">Out Time</label>
      <input type="text" id="editOutTime" placeholder="Select out date and time" />

      <label for="editReturnTime">Return Time</label>
      <input type="text" id="editReturnTime" placeholder="Select return date and time" />

      <label for="editReason">Reason</label>
      <textarea id="editReason" placeholder="Enter reason"></textarea>

      <div class="modal-actions">
        <button id="cancelEditBtn" class="secondary small">Cancel</button>
        <button id="saveEditBtn" class="small">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="/theme.js"></script>
  <script src="/student.js"></script>
</body>
</html>
