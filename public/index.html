<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outpass Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-title">Outpass Management System</div>
    <div class="nav-actions">
      <button id="themeToggle" class="theme-btn small">Night Mode</button>
    </div>
  </div>

  <div class="container">
    <div class="card" style="max-width: 460px; margin: 20px auto;">
      <h2>Login</h2>
      <div id="message"></div>

      <label>Name</label>
      <input type="text" id="name" placeholder="Enter your name" />

      <label>Role</label>
      <select id="role">
        <option value="student">Student</option>
        <option value="admin">Admin (Warden)</option>
      </select>

      <button id="loginBtn">Login</button>

      <p class="muted">
        Demo users: <b>Aman (student)</b>, <b>Riya (student)</b>, <b>Warden (admin)</b>
      </p>
    </div>
  </div>

  <script src="/theme.js"></script>
  <script src="/login.js"></script>
</body>
</html>
