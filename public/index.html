<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LNMIIT Postal Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-title">LNMIIT Postal Records System</div>
    <div class="nav-actions">
      <button id="themeToggle" class="secondary small">Night Mode</button>
    </div>
  </div>

  <div class="container">
    <div class="card" style="max-width: 520px; margin: 30px auto;">
      <h2>Staff Login</h2>
      <div id="message"></div>

      <label>Email</label>
      <input type="email" id="email" placeholder="Enter email" />

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <button id="loginBtn">Login</button>

      <p class="muted">Demo: admin.post@lnmiit.ac.in / admin123</p>
      <p class="muted">Demo: clerk.post@lnmiit.ac.in / clerk123</p>
    </div>
  </div>

  <script src="/theme.js"></script>
  <script src="/login.js"></script>
</body>
</html>
