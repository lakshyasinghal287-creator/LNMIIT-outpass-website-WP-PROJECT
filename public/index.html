<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outpass Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-title">Outpass Management System</div>
    <div class="nav-actions">
      <button id="themeToggle" class="theme-btn small">Night Mode</button>
    </div>
  </div>

  <div class="container">
    <div class="card" style="max-width: 500px; margin: 20px auto;">
      <h2>Login</h2>
      <div id="message"></div>

      <label>Name</label>
      <input type="text" id="name" placeholder="Enter your name" />

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <label>Role</label>
      <select id="role">
        <option value="student">Student</option>
        <option value="admin">Admin (Warden)</option>
      </select>

      <button id="loginBtn">Login</button>

      <div class="mini-grid" style="margin-top: 8px;">
        <div class="info-box">
          <strong>Aman</strong><br/>student / aman123
        </div>
        <div class="info-box">
          <strong>Riya</strong><br/>student / riya123
        </div>
        <div class="info-box">
          <strong>Warden</strong><br/>admin / warden123
        </div>
      </div>
    </div>
  </div>

  <script src="/theme.js"></script>
  <script src="/login.js"></script>
</body>
</html>
