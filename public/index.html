<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outpass Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-title">Outpass Management System</div>
    <div class="nav-actions">
      <button id="themeToggle" class="theme-btn small">Night Mode</button>
    </div>
  </div>

  <div class="container">
    <div class="card" style="max-width: 500px; margin: 20px auto;">
      <h2>Login</h2>
      <div id="message"></div>

      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" />

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <button id="loginBtn">Login</button>

      <p class="muted">New student? <a href="/signup.html">Create account</a></p>

      <div class="mini-grid" style="margin-top: 8px;">
        <div class="info-box">
          <strong>Admin Demo</strong><br/>warden@lnmiit.ac.in / warden123
        </div>
      </div>
    </div>
  </div>

  <script src="/theme.js"></script>
  <script src="/login.js"></script>
</body>
</html>
